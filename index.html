<style>
  /* ===== LIGHT (champagne) — default ===== */
  :root{
    --bg:#F4ECDB; --card:#FCF8EF; --card-2:#F7F0E0;
    --ink:#2B2620; --ink-soft:#4A4339; --muted:#8A8071; --muted-2:#A89D8A;
    --line:rgba(43,38,32,.10); --line-strong:rgba(43,38,32,.18);
    --gold:#A9842F; --gold-deep:#8C6B22; --gold-soft:#C2A258;
    --bordeaux:#8E2C3C; --price:#8E2C3C;
    --shadow:0 1px 3px rgba(80,60,30,.06), 0 4px 16px rgba(80,60,30,.05);
    --head-grad:#FBF4E2; --ctrl-bg:rgba(244,236,219,.92);
    --swatch-ring:rgba(0,0,0,.12); --green:#2E8B57;
  }
  /* ===== DARK (midnight) ===== */
  [data-theme="dark"]{
    --bg:#14151C; --card:#1C1E27; --card-2:#232631;
    --ink:#ECE6DA; --ink-soft:#D2CCBF; --muted:#979185; --muted-2:#6F6A60;
    --line:rgba(236,230,218,.08); --line-strong:rgba(236,230,218,.16);
    --gold:#C9A24B; --gold-deep:#D9BD78; --gold-soft:#D9BD78;
    --bordeaux:#C9596B; --price:#E7DCCB;
    --shadow:0 1px 3px rgba(0,0,0,.3), 0 4px 16px rgba(0,0,0,.25);
    --head-grad:rgba(201,162,75,.10); --ctrl-bg:rgba(20,21,28,.92);
    --swatch-ring:rgba(255,255,255,.18); --green:#5FBF87;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html{scroll-behavior:smooth}
  body{background:var(--bg);color:var(--ink);font-family:'Manrope',system-ui,sans-serif;
    font-weight:400;line-height:1.6;-webkit-font-smoothing:antialiased;padding-bottom:60px;
    transition:background .3s ease, color .3s ease}
  header{padding:18px 16px 14px;text-align:center;
    background:radial-gradient(130% 100% at 50% -10%, var(--head-grad), var(--bg) 70%);
    border-bottom:1px solid var(--line)}
  .header-top{display:flex;align-items:center;justify-content:space-between;gap:10px;margin-bottom:10px}
  header h1{font-family:'Cormorant Garamond',serif;font-weight:600;font-size:30px;line-height:1;flex:1;
    text-align:left;letter-spacing:.01em;color:var(--ink)}
  header h1 small{display:block;font-size:12px;font-family:'Manrope';font-weight:700;letter-spacing:.22em;
    text-transform:uppercase;color:var(--gold);margin-bottom:3px}
  .head-actions{display:flex;align-items:center;gap:8px}
  .icon-btn{width:34px;height:34px;border-radius:50%;border:1px solid var(--line-strong);background:var(--card);
    color:var(--gold-deep);font-size:16px;cursor:pointer;display:flex;align-items:center;
    justify-content:center;transition:.15s;box-shadow:var(--shadow);padding:0}
  .icon-btn:hover{background:var(--gold-soft);color:#fff;border-color:var(--gold-soft)}
  [data-theme="dark"] .icon-btn:hover{color:#14151C}
  .icon-btn svg{width:17px;height:17px;stroke:currentColor;fill:none;stroke-width:2}
  .info-btn{font-family:'Cormorant Garamond',serif;font-weight:700}
  .lang-picker{display:flex;gap:5px}
  .lang-btn{font-size:11px;font-weight:700;letter-spacing:.08em;padding:6px 9px;border:1px solid var(--line-strong);
    background:var(--card);color:var(--muted);border-radius:6px;cursor:pointer;transition:.15s;font-family:inherit}
  .lang-btn.active{color:#fff;background:var(--gold);border-color:var(--gold)}
  [data-theme="dark"] .lang-btn.active{color:#14151C}
  .lang-btn:hover{color:var(--ink);border-color:var(--muted)}
  header .meta{font-size:12px;color:var(--muted);letter-spacing:.03em;font-style:italic;font-family:'Cormorant Garamond',serif}
  .controls{position:sticky;top:0;z-index:20;background:var(--ctrl-bg);
    backdrop-filter:blur(12px);border-bottom:1px solid var(--line);padding:10px 12px 8px}
  .search-wrap{position:relative;max-width:680px;margin:0 auto}
  #search{width:100%;background:var(--card);border:1px solid var(--line-strong);color:var(--ink);
    font-family:inherit;font-size:14px;padding:11px 14px 11px 38px;border-radius:10px;outline:none;box-shadow:var(--shadow)}
  #search::placeholder{color:var(--muted-2)}
  #search:focus{border-color:var(--gold);box-shadow:0 0 0 3px rgba(169,132,47,.15)}
  .search-wrap svg{position:absolute;left:13px;top:50%;transform:translateY(-50%);
    width:16px;height:16px;stroke:var(--muted);fill:none;stroke-width:2}
  .chips{display:flex;gap:6px;overflow-x:auto;padding:10px 1px 1px;max-width:680px;margin:0 auto;scrollbar-width:none}
  .chips::-webkit-scrollbar{display:none}
  .chip{flex:0 0 auto;font-family:inherit;font-size:12px;font-weight:600;letter-spacing:.02em;
    color:var(--muted);background:var(--card);border:1px solid var(--line-strong);
    padding:6px 13px;border-radius:999px;cursor:pointer;transition:.15s;white-space:nowrap}
  .chip:hover{color:var(--ink);border-color:var(--muted)}
  .chip.active{color:#fff;background:var(--gold);border-color:var(--gold);font-weight:700}
  [data-theme="dark"] .chip.active{color:#14151C}
  main{max-width:720px;margin:0 auto;padding:8px 12px 0}
  .count{font-size:11.5px;color:var(--muted);text-align:center;padding:12px 0 6px;letter-spacing:.04em}
  .region{font-family:'Cormorant Garamond',serif;font-size:13px;font-weight:700;letter-spacing:.2em;
    text-transform:uppercase;color:var(--gold-deep);padding:22px 4px 10px;border-bottom:1px solid var(--line-strong);margin-bottom:13px}
  .card{background:var(--card);border:1px solid var(--line);border-left:3px solid var(--bordeaux);
    border-radius:13px;padding:15px 16px;margin-bottom:12px;box-shadow:var(--shadow)}
  .c-top{display:flex;align-items:flex-start;gap:11px}
  .swatch{flex:0 0 auto;width:25px;height:25px;border-radius:50%;margin-top:3px;
    box-shadow:inset 0 0 0 1px var(--swatch-ring), 0 1px 3px rgba(0,0,0,.18)}
  .bottle{flex:0 0 auto;width:42px;height:60px;position:relative;margin-top:2px}
  .bottle-svg{position:absolute;inset:0;width:100%;height:100%}
  .bottle-img{position:absolute;inset:0;width:100%;height:100%;object-fit:contain;
    border-radius:4px;background:var(--card)}
  .c-head{flex:1;min-width:0}
  .c-producer{font-size:10.5px;letter-spacing:.09em;text-transform:uppercase;color:var(--muted);font-weight:700}
  .c-name{font-family:'Cormorant Garamond',serif;font-weight:600;font-size:21px;line-height:1.08;margin:1px 0 3px;color:var(--ink)}
  .c-grape{font-style:italic;font-family:'Cormorant Garamond',serif;font-size:14.5px;color:var(--gold-deep)}
  .c-region{font-size:10.5px;letter-spacing:.05em;color:var(--muted);font-weight:500;margin-top:3px;display:flex;align-items:center;gap:4px}
  .c-region svg{width:10px;height:10px;stroke:var(--muted);fill:none;stroke-width:2;flex:0 0 auto}
  .c-price{flex:0 0 auto;font-family:'Cormorant Garamond',serif;font-weight:700;font-size:19px;
    color:var(--price);text-align:right;white-space:nowrap;padding-left:6px}
  .c-desc{font-size:14px;color:var(--ink-soft);margin-top:10px;line-height:1.55}
  .rows{margin-top:11px;display:flex;flex-direction:column;gap:7px}
  .row{display:flex;gap:8px;font-size:13.5px}
  .row .lab{flex:0 0 68px;font-size:10px;font-weight:800;letter-spacing:.08em;text-transform:uppercase;
    color:var(--gold-deep);padding-top:2px}
  .row .val{flex:1;color:var(--ink-soft)}
  .script{margin-top:12px;background:var(--card-2);border:1px solid var(--line-strong);border-radius:9px;
    padding:11px 12px;font-family:'Cormorant Garamond',serif;font-style:italic;font-size:16px;
    line-height:1.4;color:var(--ink)}
  .script::before{content:attr(data-label);display:block;font-family:'Manrope';font-style:normal;
    font-size:9px;font-weight:800;letter-spacing:.13em;text-transform:uppercase;color:var(--bordeaux);margin-bottom:5px}
  .note{margin-top:10px;font-size:12px;color:var(--muted);border-top:1px dashed var(--line-strong);padding-top:8px}
  .note b{color:var(--gold-deep);font-weight:700}
  .empty{text-align:center;color:var(--muted);padding:50px 20px;font-style:italic;
    font-family:'Cormorant Garamond',serif;font-size:18px;display:none}
  footer{text-align:center;color:var(--muted-2);font-size:11px;padding:28px 16px 0;letter-spacing:.03em}
  footer .ff{font-family:'Cormorant Garamond',serif;font-style:italic;font-size:15px;color:var(--muted);margin-bottom:6px}
  .overlay{position:fixed;inset:0;z-index:100;background:rgba(20,16,8,.5);backdrop-filter:blur(4px);
    display:none;align-items:flex-end;justify-content:center}
  .overlay.open{display:flex}
  .sheet{background:var(--bg);width:100%;max-width:560px;max-height:88vh;overflow-y:auto;
    border-radius:20px 20px 0 0;padding:24px 22px 40px;box-shadow:0 -8px 40px rgba(0,0,0,.3);
    animation:slideUp .28s cubic-bezier(.2,.8,.2,1)}
  @keyframes slideUp{from{transform:translateY(40px);opacity:.6}to{transform:translateY(0);opacity:1}}
  .sheet-handle{width:40px;height:4px;background:var(--line-strong);border-radius:99px;margin:0 auto 18px}
  .sheet h2{font-family:'Cormorant Garamond',serif;font-size:26px;font-weight:600;color:var(--ink);margin-bottom:4px}
  .sheet .sub{font-size:13px;color:var(--muted);margin-bottom:22px;font-style:italic;font-family:'Cormorant Garamond',serif}
  .sheet h3{font-size:12px;font-weight:800;letter-spacing:.12em;text-transform:uppercase;color:var(--gold-deep);
    margin:22px 0 12px;display:flex;align-items:center;gap:8px}
  .sheet h3 .em{font-size:16px}
  .steps{display:flex;flex-direction:column;gap:11px}
  .step{display:flex;gap:13px;align-items:flex-start}
  .step .n{flex:0 0 26px;height:26px;border-radius:50%;background:var(--gold);color:#fff;font-weight:800;
    font-size:13px;display:flex;align-items:center;justify-content:center;margin-top:1px}
  [data-theme="dark"] .step .n{color:#14151C}
  .step .t{flex:1;font-size:14px;color:var(--ink-soft);padding-top:2px}
  .feats{display:flex;flex-direction:column;gap:9px;margin-top:2px}
  .feat{display:flex;gap:10px;align-items:flex-start;background:var(--card);border:1px solid var(--line);
    border-radius:10px;padding:11px 13px;font-size:13.5px;color:var(--ink-soft)}
  .feat .ck{color:var(--green);font-weight:800;flex:0 0 auto}
  .feat b{color:var(--ink);font-weight:600}
  .close-btn{width:100%;margin-top:26px;padding:13px;border:none;border-radius:11px;background:var(--ink);
    color:var(--bg);font-family:inherit;font-size:14px;font-weight:700;letter-spacing:.03em;cursor:pointer;transition:.15s}
  .close-btn:hover{background:var(--gold-deep)}
  @media (max-width:430px){.c-name{font-size:19px} .row .lab{flex-basis:60px} header h1{font-size:26px}}
</style>
</head>

let LANG = localStorage.getItem('terrazza_lang') || 'pt';
let THEME = localStorage.getItem('terrazza_theme') || 'light';

const SUN = '<svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="5"></circle><line x1="12" y1="1" x2="12" y2="3"></line><line x1="12" y1="21" x2="12" y2="23"></line><line x1="4.2" y1="4.2" x2="5.6" y2="5.6"></line><line x1="18.4" y1="18.4" x2="19.8" y2="19.8"></line><line x1="1" y1="12" x2="3" y2="12"></line><line x1="21" y1="12" x2="23" y2="12"></line><line x1="4.2" y1="19.8" x2="5.6" y2="18.4"></line><line x1="18.4" y1="5.6" x2="19.8" y2="4.2"></line></svg>';
const MOON = '<svg viewBox="0 0 24 24"><path d="M21 12.8A9 9 0 1 1 11.2 3a7 7 0 0 0 9.8 9.8z"></path></svg>';

function applyTheme(){
  document.documentElement.setAttribute('data-theme', THEME);
  document.getElementById('themeBtn').innerHTML = THEME === 'dark' ? SUN : MOON;
  document.querySelector('meta[name="theme-color"]').setAttribute('content', THEME === 'dark' ? '#14151C' : '#F4ECDB');
}

function updateUI(){
  const t = I18N[LANG];
  document.documentElement.lang = LANG === 'pt' ? 'pt-BR' : LANG;
  document.getElementById('meta-text').textContent = t.meta;
  document.getElementById('search').placeholder = t.search;
  document.getElementById('empty').textContent = t.no_results;
  document.getElementById('footer-quote').textContent = t.footer_quote;
  document.getElementById('footer-text').textContent = t.footer_text;
  document.getElementById('sheet-title').textContent = t.sheet_title;
  document.getElementById('sheet-sub').textContent = t.sheet_sub;
  document.getElementById('howto-title').textContent = t.howto_title;
  document.getElementById('roadmap-title').textContent = t.roadmap_title;
  document.getElementById('closeBtn').textContent = t.close;
  document.getElementById('steps').innerHTML = t.steps.map((s,i)=>
    '<div class="step"><div class="n">'+(i+1)+'</div><div class="t">'+s+'</div></div>').join('');
  document.getElementById('feats').innerHTML = t.feats.map(f=>
    '<div class="feat"><span class="ck">&#10003;</span><span>'+f+'</span></div>').join('');
  const chips = document.getElementById('chips');
  chips.innerHTML = '<button class="chip active" data-cat="all">'+t.all+'</button>';
  Object.entries(t.categories).forEach(([k,l])=>{ chips.innerHTML += '<button class="chip" data-cat="'+k+'">'+l+'</button>'; });
  filter();
}

function slug(w){
  return (w.pr+'-'+w.nm).normalize('NFD').replace(/[\u0300-\u036f]/g,'')
    .toLowerCase().replace(/[^a-z0-9]+/g,'-').replace(/^-+|-+$/g,'');
}
function bottleSVG(cat,c){
  var s='';
  if(cat==='Rosso'){
    s+='<rect x="17" y="3" width="10" height="7" rx="1.5" fill="'+c+'"/>';
    s+='<path d="M18 9L26 9 26 38C26 41 33 45 33 55L33 110a4 4 0 0 1-4 4L15 114a4 4 0 0 1-4-4L11 55C11 45 18 41 18 38Z" fill="'+c+'" stroke="var(--line-strong)" stroke-width="1"/>';
  } else if(cat==='Dolce'){
    s+='<rect x="17" y="30" width="10" height="6" rx="1.5" fill="'+c+'"/>';
    s+='<path d="M18 35L18 48C18 54 11 58 11 70L11 110a4 4 0 0 0 4 4h14a4 4 0 0 0 4-4L33 70C33 58 26 54 26 48L26 35Z" fill="'+c+'" stroke="var(--line-strong)" stroke-width="1"/>';
  } else {
    if(cat==='Spumante'||cat==='Champagne'){
      s+='<rect x="16" y="4" width="12" height="14" rx="1.5" fill="'+c+'"/><rect x="16" y="4" width="12" height="14" rx="1.5" fill="#000" opacity=".14"/>';
    } else {
      s+='<rect x="17" y="6" width="10" height="9" rx="1.5" fill="'+c+'"/>';
    }
    s+='<path d="M18 15L18 32C18 40 10 44 10 56L10 110a4 4 0 0 0 4 4h16a4 4 0 0 0 4-4L34 56C34 44 26 40 26 32L26 15Z" fill="'+c+'" stroke="var(--line-strong)" stroke-width="1"/>';
  }
  var ly = (cat==='Dolce') ? 82 : 76;
  var lh = (cat==='Dolce') ? 22 : 28;
  s+='<rect x="11.5" y="'+ly+'" width="21" height="'+lh+'" rx="2" fill="var(--card)" stroke="var(--line-strong)" stroke-width="1"/>';
  return '<svg class="bottle-svg" viewBox="0 0 44 120" preserveAspectRatio="xMidYMid meet">'+s+'</svg>';
}
function render(F){
  const t = I18N[LANG];
  const L = document.getElementById('list'), C = document.getElementById('count'), E = document.getElementById('empty');
  L.innerHTML = ''; let last = '';
  F.forEach(w => {
    if(w.reg !== last){ L.innerHTML += '<div class="region">'+w.reg+'</div>'; last = w.reg; }
    let noteHtml = w.note ? '<div class="note">'+w.note[LANG]+'</div>' : '';
    let imgsrc = w.img ? w.img : ('img/'+slug(w)+'.jpg');
    L.innerHTML += '<div class="card">'+
      '<div class="c-top">'+
        '<div class="bottle">'+bottleSVG(w.cat,w.col)+'<img class="bottle-img" loading="lazy" alt="" src="'+imgsrc+'" onerror="this.remove()"></div>'+
        '<div class="c-head">'+
          '<div class="c-producer">'+w.pr+'</div>'+
          '<div class="c-name">'+w.nm+'</div>'+
          '<div class="c-grape">'+w.gr+'</div>'+
          '<div class="c-region"><svg viewBox="0 0 24 24"><path d="M12 21s-7-5.5-7-11a7 7 0 0 1 14 0c0 5.5-7 11-7 11z"></path><circle cx="12" cy="10" r="2.3"></circle></svg>'+w.reg+'</div>'+
        '</div>'+
        '<div class="c-price">'+w.pz+'</div>'+
      '</div>'+
      '<div class="c-desc">'+w.desc[LANG]+'</div>'+
      '<div class="rows">'+
        '<div class="row"><div class="lab">'+t.serve+'</div><div class="val">'+w.serve[LANG]+'</div></div>'+
        '<div class="row"><div class="lab">'+t.pair+'</div><div class="val">'+w.pair[LANG]+'</div></div>'+
      '</div>'+
      '<div class="script" data-label="'+t.script_label+'">'+w.scr[LANG]+'</div>'+
      noteHtml+
    '</div>';
  });
  const regs = [...new Set(F.map(w=>w.reg))].length;
  C.textContent = F.length+' '+(F.length===1?t.count_wine:t.count_wines)+' · '+regs+' '+(regs===1?t.count_region:t.count_regions);
  E.style.display = F.length === 0 ? 'block' : 'none';
}

function filter(){
  const Q = document.getElementById('search').value.toLowerCase();
  const A = (document.querySelector('.chip.active') && document.querySelector('.chip.active').dataset.cat) || 'all';
  let F = WINES.filter(w => A==='all' || w.cat===A);
  if(Q) F = F.filter(w => (w.pr+' '+w.nm+' '+w.gr+' '+w.reg+' '+w.desc[LANG]+' '+w.pair[LANG]).toLowerCase().includes(Q));
  render(F);
}

document.querySelectorAll('.lang-btn').forEach(b=>{
  b.addEventListener('click', ()=>{
    document.querySelector('.lang-btn.active').classList.remove('active');
    b.classList.add('active');
    LANG = b.dataset.lang; localStorage.setItem('terrazza_lang', LANG);
    updateUI();
  });
});
document.getElementById('search').addEventListener('input', filter);
document.getElementById('chips').addEventListener('click', e=>{
  if(e.target.classList.contains('chip')){
    document.querySelector('.chip.active').classList.remove('active');
    e.target.classList.add('active'); filter();
  }
});
document.getElementById('themeBtn').addEventListener('click', ()=>{
  THEME = (THEME === 'dark') ? 'light' : 'dark';
  localStorage.setItem('terrazza_theme', THEME);
  applyTheme();
});
const ov = document.getElementById('overlay');
document.getElementById('infoBtn').addEventListener('click', ()=> ov.classList.add('open'));
document.getElementById('closeBtn').addEventListener('click', ()=> ov.classList.remove('open'));
ov.addEventListener('click', e=>{ if(e.target===ov) ov.classList.remove('open'); });

document.querySelectorAll('.lang-btn').forEach(b=> b.classList.toggle('active', b.dataset.lang===LANG));
applyTheme();
updateUI();
</script>
